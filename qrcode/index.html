<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./images/favicon-32x32.png"
    />

    <link
      rel="stylesheet"
      href="- Family: [Outfit](https://fonts.google.com/specimen/Outfit)
- Weights: 400, 700"
    />

    <title>Frontend Mentor | QR code component</title>

    <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
    <style>
      p {
        font-size: 15px;
      }

      body {
        font-family: "Outfit", sans-serif;
        background-color: hsl(212, 45%, 89%);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: flex-end;
        gap: 20px;
        height: 100vh;
      }

      .rounder {
        border-radius: 15px;
      }

      .card {
        display: flex;
        flex-direction: column;
        border-radius: 20px;
        padding: 20px;
        margin: 20px;
        background-color: hsl(0, 0%, 100%);
        text-align: center;
        max-width: 300px;
      }

      .card p {
        color: hsl(216, 15%, 48%);
      }

      .card h2 {
        color: hsl(218, 44%, 22%);
      }
      .card img {
        object-fit: cover;
      }

      .attribution {
        font-size: 11px;
        text-align: center;
      }
      .attribution a {
        color: hsl(228, 45%, 44%);
      }
    </style>
  </head>
  <body>
    <div class="card">
      <img src="images/image-qr-code.png" alt="" class="rounder" />

      <h2>Improve your front-end skills by building projects</h2>

      <p>
        Scan the QR code to visit Frontend Mentor and take your coding skills to
        the next level
      </p>
    </div>

    <div class="attribution">
      Challenge by
      <a href="https://www.frontendmentor.io?ref=challenge" target="_blank"
        >Frontend Mentor</a
      >. Coded by <a href="#">Your Name Here</a>.
    </div>
  </body>
</html>
